<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- Set preferred serif, sans serif, and monospace fonts. -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>Lunchtype 22</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer><family>Lunchtype 22</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Annotation Mono</family></prefer>
  </alias>
</fontconfig>
