[window]
opacity = 0.8
blur = true

[window.padding]
x = 14
y = 14

[font]
normal = { family = "FiraCode", style = "Regular" }

[colors]
# transparent_background_colors = true

[colors.primary]
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"

[colors.cursor]
text = "{{colors.on_surface.default.hex}}"
cursor = "{{colors.on_surface_variant.default.hex}}"

[colors.vi_mode_cursor]
text = "{{colors.background.default.hex}}"
cursor = "{{colors.primary.default.hex}}"

[colors.search.matches]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.tertiary.default.hex}}"

[colors.search.focused_match]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.primary.default.hex}}"

[colors.footer_bar]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.inverse_surface.default.hex}}"

[colors.hints.start]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.secondary.default.hex}}"

[colors.hints.end]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.secondary.default.hex}}"

[colors.selection]
text = "{{colors.background.default.hex}}"
background = "{{colors.primary.default.hex}}"

[colors.normal]
black = "#181818"
red = "{{colors.error.default.hex}}"
green = "{{colors.primary.default.hex}}"
yellow = "{{colors.inverse_primary.default.hex}}"
blue = "{{colors.primary.default.hex}}"
magenta = "{{colors.tertiary.default.hex}}"
cyan = "{{colors.secondary.default.hex}}"
white = "#BAC2DE"

[colors.bright]
black = '{{ "#181818" | to_color | lighten: 10.0}}'
red = "{{colors.error.default.hex | lighten: 10.0}}"
green = "{{colors.primary.default.hex  | lighten: 10.0}}"
yellow = "{{colors.inverse_primary.default.hex  | lighten: 10.0 }}"
blue = "{{colors.primary.default.hex  | lighten: 10.0 }}"
magenta = "{{colors.tertiary.default.hex  | lighten: 10.0 }}"
cyan = "{{colors.secondary.default.hex  | lighten: 10.0 }}"
white = '{{"#BAC2DE" | to_color | lighten: 10.0}}'

[colors.dim]
black = '{{ "#181818" | to_color | lighten: -10.0}}'
red = "{{colors.error.default.hex | lighten: -10.0}}"
green = "{{colors.primary.default.hex  | lighten: -10.0}}"
yellow = "{{colors.inverse_primary.default.hex  | lighten: -10.0 }}"
blue = "{{colors.primary.default.hex  | lighten: -10.0 }}"
magenta = "{{colors.tertiary.default.hex  | lighten: -10.0 }}"
cyan = "{{colors.secondary.default.hex  | lighten: -10.0 }}"
white = '{{"#BAC2DE" | to_color | lighten: -10.0}}'
